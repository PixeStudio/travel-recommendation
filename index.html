<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBloom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            
            <h1>TravelBloom</h1>
        </div>
        <nav class="nav">
            <ul class="menu">
                <li class="items"><a href="#home">Home</a></li>
                <li class="items"><a href="#aboutus">About us</a></li>
                <li class="items"><a href="#contactus">Contact Us</a></li>
            </ul>
        </nav>
        <div class="search-panel">
            <input type="text" placeholder="Search destinations...">
            <span class="search-icon">
            <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16" y1="16" x2="22" y2="22"></line>
                </svg>
            </span>
            <button type="button" class="b-search">Search</button>
            <button type="button" class="b-reset">Reset</button>
        </div>
    </header>
    <main>
        <section id="home" class="home">
            <div class="home__social">
                <a href="#">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-2.9h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.3.2 2.3.2v2.5h-1.3c-1.3 0-1.7.8-1.7 1.6v1.9H17l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z"/>
                    </svg>
                </a>
                <a href="#">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm6.5-.9a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
                    </svg>
                </a>
                <a href="#">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.4 3.5 12 3.5 12 3.5s-7.4 0-9.4.6A3 3 0 0 0 .5 6.2 31.3 31.3 0 0 0 0 12a31.3 31.3 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c2 .6 9.4.6 9.4.6s7.4 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.3 31.3 0 0 0 24 12a31.3 31.3 0 0 0-.5-5.8zM9.8 15.5v-7l6.2 3.5-6.2 3.5z"/>
                    </svg>
                </a>
            </div>
            <div class="home__content">
                <h2>Explore Dream Destinations</h2>
                <p>Discover inspiring places around the world and find travel recommendations tailored to your interests. Explore beaches, temples, and exciting destinations for your next journey.</p>
                <button type="button">Book Now</button>
            </div>
            <div id="results" class="home__results"></div>
        </section>
    </main>

    <script src="travel_recommendation.js"></script>
</body>
</html>
